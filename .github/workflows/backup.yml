name: Weekly Supabase Backup

on:
  schedule:
    # Cada domingo a las 9:00 UTC
    - cron: '0 9 * * 0'
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub Actions

permissions:
  contents: write      # necesario para hacer git commit + push

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: github-pages   # mismos secrets que el deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/backup.mjs

      - name: Commit backup if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          # Solo hace commit si hay cambios reales
          git diff --cached --quiet || git commit -m "chore: weekly backup $(date -u +%Y-%m-%d)"
          git push

