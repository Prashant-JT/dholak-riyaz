name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate supabase.ts stub for tests
        run: |
          cat > src/core/supabase.ts << 'TSEOF'
          export interface SupabaseClient {
              from: (table: string) => any;
              auth: any;
          }
          export const db: SupabaseClient = {} as SupabaseClient;
          TSEOF

      - name: Run tests
        run: npm test

      - name: Generate supabase.ts from secrets
        run: |
          cat > src/core/supabase.ts << 'TSEOF'
          declare const supabase: {
              createClient: (url: string, key: string) => any;
          };
          export interface SupabaseClient {
              from: (table: string) => any;
              auth: any;
          }
          export const db: SupabaseClient = supabase.createClient(
              '${{ secrets.SUPABASE_URL }}',
              '${{ secrets.SUPABASE_ANON_KEY }}'
          );
          TSEOF

      - name: Build TypeScript
        run: npm run build

      - name: List dist contents (debug)
        run: ls -la dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

